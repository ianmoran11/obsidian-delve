name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      branch:
        description: 'Branch to build from'
        required: true
        default: 'claude/init-delve-plugin-4pOR2'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: plugin
        run: npm install

      - name: Build plugin
        working-directory: plugin
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f plugin/main.js ]; then
            echo "ERROR: plugin/main.js not found after build"
            exit 1
          fi
          echo "Build output: $(wc -c < plugin/main.js) bytes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Delve ${{ github.event.inputs.version }}
          body: |
            ## Delve ${{ github.event.inputs.version }}

            ### What's included
            - Stage 0: Topic Explorer — fully implemented
            - Stages 1–4: Architecture scaffolded, implementation in progress

            ### Install via BRAT
            1. Install [BRAT](https://github.com/TfTHacker/obsidian42-brat) from Community Plugins
            2. **Settings → BRAT → Add Beta Plugin** → `ianmoran11/obsidian-delve`
            3. Enable **Delve** in Community Plugins
            4. Add your OpenRouter API key in **Settings → Delve**
          files: |
            plugin/main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false
