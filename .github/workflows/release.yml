name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.1'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: plugin
        run: npm install

      - name: Build plugin
        working-directory: plugin
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f plugin/main.js ]; then
            echo "ERROR: plugin/main.js not found"
            exit 1
          fi
          echo "Build: $(wc -c < plugin/main.js) bytes"

      - name: Stage release assets
        run: |
          cp plugin/main.js main.js
          cp plugin/manifest.json manifest.json

      - name: Compute release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Delve ${{ steps.version.outputs.value }}
          body: |
            ## Delve ${{ steps.version.outputs.value }}

            ### Install via BRAT
            1. Install [BRAT](https://github.com/TfTHacker/obsidian42-brat) from Community Plugins
            2. **Settings → BRAT → Add Beta Plugin** → `ianmoran11/obsidian-delve`
            3. Enable **Delve** in Community Plugins
            4. Add your OpenRouter API key in **Settings → Delve**

            ### What’s in this release
            - Fixed the Stage 0 → Stage 1 Confirm Scope handoff
            - Added clearer missing-API-key guidance in the Scope view
            - Switched the default model to `google/gemini-3-flash-preview`
            - Updated packaged assets for BRAT/mobile installs
          files: |
            main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false
