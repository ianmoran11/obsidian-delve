name: Build and Release

on:
  push:
    branches:
      - 'claude/init-delve-plugin-4pOR2'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/init-delve-plugin-4pOR2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: plugin
        run: npm install

      - name: Build plugin
        working-directory: plugin
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f plugin/main.js ]; then
            echo "ERROR: plugin/main.js not found"
            exit 1
          fi
          echo "Build: $(wc -c < plugin/main.js) bytes"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: '0.1.0'
          name: 'Delve 0.1.0'
          body: |
            ## Delve 0.1.0

            ### Install via BRAT
            1. Install [BRAT](https://github.com/TfTHacker/obsidian42-brat) from Community Plugins
            2. **Settings → BRAT → Add Beta Plugin** → `ianmoran11/obsidian-delve`
            3. Enable **Delve** in Community Plugins
            4. Add your OpenRouter API key in **Settings → Delve**

            ### What's in this release
            - Stage 0: Topic Explorer — interactive scope tree with Split, Expand, Suggest Related
            - Stage 1: Concept Extraction — LLM extracts 15–25 foundational concepts from your chosen scope
            - Stage 2: Self-Assessment — rate your familiarity with each concept (Likert 1–5)
            - Stages 3–4: Scaffolded, coming next
          files: |
            plugin/main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false
